    <style>
        /* Stile generale */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #2e7d32;
            text-align: center;
            font-size: 3em;
            margin-bottom: 20px;
        }

        p {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        /* Lista */
        ul {
            list-style-type: none;
            padding: 0;
            max-width: 400px;
            margin: 0 auto;
        }

        li {
            margin: 15px 0;
        }

        /* Link come pulsanti */
        a {
            display: block;
            text-decoration: none;
            background-color: #2e7d32;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        a:hover {
            background-color: #1b5e20;
            transform: scale(1.05);
        }
    </style>
