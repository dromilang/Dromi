name: "⚠️ Incompatibility Report"
description: "Segnala un file, modulo o configurazione incompatibile con Dromi"
title: "[INCOMPATIBILITY] Breve descrizione"
labels: ["incompatibility"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        "## Descrizione del problema
        Quale file, modulo, o configurazione non funziona con Dromi?"

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Comportamento atteso"
      description: "Cosa ti aspettavi che Dromi facesse con questo file o configurazione?"
      placeholder: "Descrivi cosa ti aspettavi"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "Comportamento reale"
      description: "Cosa succede realmente quando provi ad usarlo? Errori, crash o comportamenti strani."
      placeholder: "Descrivi il comportamento reale"
    validations:
      required: true

  - type: input
    id: dromi_version
    attributes:
      label: "Versione Dromi"
      description: "Inserisci la versione di Dromi"
      placeholder: "es. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "Sistema operativo"
      description: "Seleziona il tuo sistema operativo"
      options:
        - "Windows 10"
        - "Windows 11"
        - "Linux"
    validations:
      required: true

  - type: input
    id: module_version
    attributes:
      label: "Versione modulo/software coinvolto"
      description: "Versione del file, modulo o software coinvolto (se applicabile)"
      placeholder: "es. 2.3.1"
    validations:
      required: false

  - type: textarea
    id: reproduction_steps
    attributes:
      label: "Passi per riprodurre"
      description: "Come riprodurre l'incompatibilità passo passo"
      placeholder: |
        "1. Apri Dromi
        2. Carica il file o modulo incompatibile
        3. Esegui l'azione
        4. Nota l'errore o comportamento anomalo"
    validations:
      required: true

  - type: textarea
    id: logs_screenshots
    attributes:
      label: "Log / Screenshot"
      description: "Allega log, errori o screenshot utili per capire l'incompatibilità."
      placeholder: |
        "Error: ...
        Stack trace: ..."
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: "Note aggiuntive"
      description: "Qualsiasi informazione extra: workaround conosciuti, file di esempio, ecc."
      placeholder: "Dettagli extra..."
    validations:
      required: false
